# Model hyperparameters

ridge:
  alpha: 1.0

random_forest:
  n_estimators: 300
  max_depth: null
  min_samples_leaf: 2
  n_jobs: -1

gradient_boosting:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 3
  subsample: 0.9

xgboost:
  n_estimators: 400
  learning_rate: 0.05
  max_depth: 5
  subsample: 0.9
  colsample_bytree: 0.9
