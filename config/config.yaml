seed: 42
target: count
datetime_col: datetime

cv:
  n_splits: 5
  # experiment: 2026-06-04_validation-gap-diagnostics.md - chronological buffer
  # (in samples; ~hours for hourly data) between TimeSeriesSplit train and
  # validation folds. 0 = no gap, reproduces the recorded metrics.json CV.
  gap: 0

paths:
  raw_train: data/raw/train.csv
  raw_test: data/raw/test.csv
  raw_sample_submission: data/raw/sampleSubmission.csv
  interim_dir: data/interim
  processed_dir: data/processed
  models_dir: models
  reports_dir: reports

# Columns that must never appear in the feature matrix for the count model.
# casual and registered sum to count and are absent from test.csv (leakage).
drop_columns:
  - casual
  - registered
